    <!-- JSON-LD: LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Creationation",
      "description": "Premium digital product studio specializing in custom web apps, mobile apps and digital solutions.",
      "url": "https://creationation.app",
      "email": "hello@creationation.app",
      "telephone": "+436702022360",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Vienna",
        "addressCountry": "AT"
      },
      "areaServed": ["AT", "FR", "DE", "CH", "EU"],
      "serviceType": ["Web Development", "Mobile App Development", "Digital Solutions"],
      "priceRange": "€€",
      "sameAs": [],
      "image": "https://creationation.app/cn-og-image.png"
    }
    </script>

    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How long does a project take?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "On average 2 weeks for a showcase site, 3-4 weeks for a platform with advanced features. We adapt to your timeline."
          }
        },
        {
          "@type": "Question",
          "name": "What does the monthly maintenance include?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Hosting, security updates, minor content changes, chat tech support and 24/7 monitoring."
          }
        },
        {
          "@type": "Question",
          "name": "Can I pay in installments?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, we offer payment in 2 or 3 interest-free installments for all our plans."
          }
        },
        {
          "@type": "Question",
          "name": "Can I edit my site myself?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Depending on your plan, you get access to an admin dashboard to manage your content. For technical changes, our team handles it."
          }
        },
        {
          "@type": "Question",
          "name": "Do you work with clients outside France?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Absolutely! We work with businesses in France, Austria, Switzerland and all across Europe. Everything is done remotely."
          }
        },
        {
          "@type": "Question",
          "name": "What happens after launch?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We stay by your side. Ongoing support, monthly analytics, and improvement suggestions based on your user data."
          }
        }
      ]
    }
    </script>
